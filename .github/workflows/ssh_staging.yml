name: Staging Deploy
# SSH接続デプロイ（ステージング環境）
# サーバー側にrsyncがインストールされている必要あり
# rsync --version

on:
  push:
    branches: [dev]
    paths: # テーマ名を変更した場合は下記も変更すること（env.THEME_NAMEは反映されないため）
      - 'wp/wp-content/themes/themeName/**'
      - 'src/**'
      - 'public/**'
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  THEME_NAME: themeName # テーマ名をここで管理

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use Node.js 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.STAGING_SSH_KEY }}
          known_hosts: unnecessary # 次のステップでssh-keyscanにより追加

      - name: Add known_hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            ./wp/wp-content/themes/${{ env.THEME_NAME }}/ \
            ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/bitnami/wordpress/wp-content/themes/${{ env.THEME_NAME }}/
